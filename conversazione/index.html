<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversazione — Italian Group Chat</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    body { padding: 0; max-width: none; }
    .site-nav, .nav-wrapper { padding-left: 20px; padding-right: 20px; max-width: 1100px; margin: 0 auto; }

    .chat-app { display: flex; height: calc(100vh - 80px); max-width: 1100px; margin: 0 auto; }

    /* ── Sidebar ── */
    .sidebar { width: 260px; background: #f0f2f5; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-head { padding: 14px 16px; font-weight: 700; font-size: .95em; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
    .sidebar-head button { background: #1e88e5; color: #fff; border: none; padding: 5px 12px; border-radius: 6px; font-size: .8em; font-weight: 600; cursor: pointer; }
    .sidebar-head button:hover { background: #1565c0; }
    .convo-list { flex: 1; overflow-y: auto; }
    .convo-item { padding: 12px 16px; border-bottom: 1px solid #e8e8e8; cursor: pointer; font-size: .85em; }
    .convo-item:hover { background: #e3e6ea; }
    .convo-item.active { background: #d4e4f7; }
    .convo-item .convo-date { color: #888; font-size: .78em; }
    .convo-item .convo-preview { color: #444; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Main chat ── */
    .chat-main { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0L60 30L30 60L0 30z' fill='%23d6cfc5' fill-opacity='.12'/%3E%3C/svg%3E"); }

    /* Header with character avatars */
    .chat-header { padding: 10px 16px; background: #075e54; color: #fff; display: flex; align-items: center; gap: 10px; }
    .chat-header .group-name { font-weight: 600; font-size: .95em; }
    .chat-header .group-members { font-size: .78em; opacity: .85; }
    .chat-header .avatars { display: flex; gap: 4px; margin-left: auto; }
    .chat-header .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }

    /* Messages */
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px 60px; display: flex; flex-direction: column; gap: 4px; }
    .msg { max-width: 70%; padding: 7px 12px 6px; border-radius: 8px; font-size: .88em; line-height: 1.5; position: relative; word-wrap: break-word; }
    .msg .msg-name { font-size: .75em; font-weight: 700; margin-bottom: 2px; }
    .msg .msg-time { font-size: .68em; color: #999; float: right; margin-left: 10px; margin-top: 4px; }
    .msg.me { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
    .msg.other { background: #fff; align-self: flex-start; border-top-left-radius: 0; }
    .msg.system { background: #ffefc3; align-self: center; font-size: .78em; color: #666; text-align: center; border-radius: 6px; max-width: 80%; }

    /* Character colors */
    .msg .name-marco { color: #d32f2f; }
    .msg .name-giulia { color: #7b1fa2; }
    .msg .name-luca { color: #f57c00; }
    .msg .name-sofia { color: #0288d1; }

    /* Typing indicator */
    .typing { align-self: flex-start; background: #fff; padding: 10px 16px; border-radius: 8px; font-size: .82em; color: #888; font-style: italic; display: none; }
    .typing.show { display: block; }

    /* Input */
    .chat-footer { padding: 10px 16px; background: #f0f2f5; display: flex; gap: 8px; }
    .chat-footer textarea { flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 16px; font-size: .88em; font-family: inherit; resize: none; height: 42px; outline: none; }
    .chat-footer textarea:focus { border-color: #075e54; }
    .chat-footer button { background: #075e54; color: #fff; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .chat-footer button:disabled { opacity: .5; }
    .chat-footer button:hover:not(:disabled) { background: #064e46; }
    .chat-footer .btn-continue { background: #1e88e5; border-radius: 20px; width: auto; padding: 0 16px; font-size: .8em; font-weight: 600; }

    /* Profiles panel */
    .profiles { display: none; padding: 16px; background: #fff; border-left: 1px solid #ddd; width: 260px; overflow-y: auto; font-size: .82em; line-height: 1.5; flex-shrink: 0; }
    .profiles.open { display: block; }
    .profiles h3 { margin: 0 0 12px; font-size: .95em; }
    .profile-card { margin-bottom: 16px; padding: 10px; background: #f9f9f9; border-radius: 8px; }
    .profile-card .p-name { font-weight: 700; font-size: .9em; margin-bottom: 4px; }
    .profile-card .p-detail { color: #555; }

    @media (max-width: 768px) {
      .sidebar { width: 200px; }
      .chat-messages { padding: 12px 16px; }
      .profiles { display: none !important; }
    }
  </style>
</head>
<body>
  <script src="../env.js"></script>
  <script src="../nav.js"></script>

  <div class="chat-app">
    <!-- Sidebar: conversation list -->
    <div class="sidebar">
      <div class="sidebar-head">
        <span>Chats</span>
        <button id="new-convo">+ New</button>
      </div>
      <div class="convo-list" id="convo-list"></div>
    </div>

    <!-- Main chat -->
    <div class="chat-main">
      <div class="chat-header">
        <div>
          <div class="group-name">Amici Italiani</div>
          <div class="group-members">Marco, Giulia, Luca, Sofia, You</div>
        </div>
        <div class="avatars">
          <div class="avatar" style="background:#d32f2f" title="Marco">M</div>
          <div class="avatar" style="background:#7b1fa2" title="Giulia">G</div>
          <div class="avatar" style="background:#f57c00" title="Luca">L</div>
          <div class="avatar" style="background:#0288d1" title="Sofia">S</div>
        </div>
      </div>

      <div class="chat-messages" id="chat-messages"></div>
      <div class="typing" id="typing">typing...</div>

      <div class="chat-footer">
        <textarea id="user-input" placeholder="Write a message..."></textarea>
        <button class="btn-continue" id="btn-continue" title="Let them talk">&#x25B6;</button>
        <button id="btn-send" title="Send">&#x27A4;</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    // ── Characters ──────────────────────────────────────────
    var CHARACTERS = {
      Marco: {
        emoji: "M", color: "#d32f2f",
        bio: "32, from Rome. Chef at a trattoria in Trastevere. Loud, warm, always hungry. Huge AS Roma fan. Uses Roman slang (daje, aoo, che te devo di). Talks about food, calcio, life in Rome. Drops in dialect sometimes."
      },
      Giulia: {
        emoji: "G", color: "#7b1fa2",
        bio: "28, from Milan. Works in fashion PR. Sophisticated but fun. Loves aperitivo, travel, design, Instagram. Occasionally teases Marco about his Roman ways. Uses modern slang (tipo, cioè, assurdo)."
      },
      Luca: {
        emoji: "L", color: "#f57c00",
        bio: "35, from Naples. Street musician (guitar). Super expressive, emotional, philosophical about life. Uses Neapolitan expressions (uè, jamm, bell). Loves food arguments with Marco (Napoli vs Roma). Big heart, always encouraging."
      },
      Sofia: {
        emoji: "S", color: "#0288d1",
        bio: "26, from Florence. Art history student. Bookish but has dry wit. References paintings, books, history casually. Quiet until she drops a perfect one-liner. Uses proper Italian but not stiff."
      }
    };

    var SYSTEM_PROMPT =
      "You are simulating a casual Italian group chat with 4 characters. The 5th person is the student learning Italian.\n\n" +
      "CHARACTERS:\n" +
      "- Marco: " + CHARACTERS.Marco.bio + "\n" +
      "- Giulia: " + CHARACTERS.Giulia.bio + "\n" +
      "- Luca: " + CHARACTERS.Luca.bio + "\n" +
      "- Sofia: " + CHARACTERS.Sofia.bio + "\n\n" +
      "RULES:\n" +
      "- Write as a natural WhatsApp group chat — short messages, casual, with typos/abbreviations Italians actually use\n" +
      "- Mix Italian and occasionally help the student if they make mistakes (gently, as a friend would)\n" +
      "- Each character stays in personality\n" +
      "- Topics: daily life, food, travel, weekend plans, news, opinions, jokes, Italian culture\n" +
      "- Keep it fun and natural, NOT like a language lesson\n" +
      "- Use plain text only. No markdown, no **, no formatting\n" +
      "- RESPOND FORMAT: Return ONLY a JSON array of messages. Each message is {\"from\":\"Name\",\"text\":\"message\"}. Return 2-4 messages per turn.\n" +
      "- Example: [{\"from\":\"Marco\",\"text\":\"Raga ma avete visto la partita ieri?\"},{\"from\":\"Luca\",\"text\":\"Uè Marco, non me ne parlare...\"}]\n" +
      "- When the student (\"You\") writes, have characters respond to them naturally. If they write in English, gently nudge them toward Italian. If they make grammar mistakes, correct them casually like a friend would.\n" +
      "- ONLY return the JSON array, nothing else.";

    // ── Online presence system ────────────────────────────
    // Each character has a random schedule. They come online,
    // stay for a bit, then go offline. Feels like real life.
    var ALL_NAMES = ["Marco", "Giulia", "Luca", "Sofia"];
    var presence = {};

    function initPresence() {
      var now = Date.now();
      for (var i = 0; i < ALL_NAMES.length; i++) {
        var name = ALL_NAMES[i];
        // Each person: random online window (2-6 min), then offline (3-8 min)
        var onlineDuration = (120 + Math.random() * 240) * 1000;  // 2-6 min
        var offlineDuration = (180 + Math.random() * 480) * 1000; // 3-8 min
        var cycle = onlineDuration + offlineDuration;
        // Stagger start so they don't all sync up
        var offset = Math.random() * cycle;
        presence[name] = { onlineDur: onlineDuration, offlineDur: offlineDuration, cycle: cycle, offset: offset, start: now };
      }
    }

    function isOnline(name) {
      var p = presence[name];
      var elapsed = ((Date.now() - p.start) + p.offset) % p.cycle;
      return elapsed < p.onlineDur;
    }

    function getOnlineNames() {
      var online = [];
      for (var i = 0; i < ALL_NAMES.length; i++) {
        if (isOnline(ALL_NAMES[i])) online.push(ALL_NAMES[i]);
      }
      // Always have at least 1 person online
      if (online.length === 0) {
        online.push(ALL_NAMES[Math.floor(Math.random() * ALL_NAMES.length)]);
      }
      return online;
    }

    function updateHeaderStatus() {
      var online = getOnlineNames();
      var membersEl = document.querySelector(".group-members");
      var parts = [];
      for (var i = 0; i < ALL_NAMES.length; i++) {
        var n = ALL_NAMES[i];
        if (online.indexOf(n) !== -1) {
          parts.push(n);
        }
      }
      membersEl.textContent = parts.join(", ") + " online";

      // Update avatar opacity
      var avatars = document.querySelectorAll(".chat-header .avatar");
      for (var j = 0; j < avatars.length; j++) {
        var title = avatars[j].getAttribute("title");
        avatars[j].style.opacity = (online.indexOf(title) !== -1) ? "1" : "0.35";
      }
    }

    initPresence();
    setInterval(updateHeaderStatus, 3000);

    // ── Storage ─────────────────────────────────────────────
    var STORAGE_KEY = "italian_convos";

    function loadConvos() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch (e) { return []; }
    }
    function saveConvos(convos) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(convos));
    }

    var convos = loadConvos();
    var activeConvoId = null;

    // ── Elements ────────────────────────────────────────────
    var convoListEl = document.getElementById("convo-list");
    var messagesEl = document.getElementById("chat-messages");
    var typingEl = document.getElementById("typing");
    var inputEl = document.getElementById("user-input");
    var sendBtn = document.getElementById("btn-send");
    var continueBtn = document.getElementById("btn-continue");
    var newConvoBtn = document.getElementById("new-convo");

    // ── Render sidebar ──────────────────────────────────────
    function renderSidebar() {
      convoListEl.innerHTML = "";
      for (var i = convos.length - 1; i >= 0; i--) {
        var c = convos[i];
        var div = document.createElement("div");
        div.className = "convo-item" + (c.id === activeConvoId ? " active" : "");
        var preview = c.messages.length > 0 ? c.messages[c.messages.length - 1].text : "New conversation";
        if (preview.length > 40) preview = preview.substring(0, 40) + "...";
        var d = new Date(c.id);
        div.innerHTML = '<div class="convo-date">' + d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) + '</div>' +
          '<div class="convo-preview">' + escHtml(preview) + '</div>';
        div.setAttribute("data-id", c.id);
        div.addEventListener("click", (function(id) { return function() { switchConvo(id); }; })(c.id));
        convoListEl.appendChild(div);
      }
    }

    // ── Render messages ─────────────────────────────────────
    function renderMessages() {
      var convo = getActiveConvo();
      messagesEl.innerHTML = "";
      if (!convo) return;

      for (var i = 0; i < convo.messages.length; i++) {
        appendMsgDom(convo.messages[i]);
      }
      scrollBottom();
    }

    function appendMsgDom(msg) {
      var div = document.createElement("div");
      if (msg.from === "system") {
        div.className = "msg system";
        div.textContent = msg.text;
      } else if (msg.from === "You") {
        div.className = "msg me";
        div.innerHTML = '<span class="msg-time">' + (msg.time || "") + '</span>' + escHtml(msg.text);
      } else {
        div.className = "msg other";
        var nameClass = "name-" + msg.from.toLowerCase();
        div.innerHTML = '<div class="msg-name ' + nameClass + '">' + msg.from + '</div>' +
          '<span class="msg-time">' + (msg.time || "") + '</span>' + escHtml(msg.text);
      }
      messagesEl.appendChild(div);
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function escHtml(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function timeNow() {
      return new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
    }

    // ── Convo helpers ───────────────────────────────────────
    function getActiveConvo() {
      for (var i = 0; i < convos.length; i++) {
        if (convos[i].id === activeConvoId) return convos[i];
      }
      return null;
    }

    function addMsg(from, text) {
      var convo = getActiveConvo();
      if (!convo) return;
      var msg = { from: from, text: text, time: timeNow() };
      convo.messages.push(msg);
      saveConvos(convos);
      appendMsgDom(msg);
      scrollBottom();
    }

    // ── API call ────────────────────────────────────────────
    async function callAI(extraUserMsg) {
      var key = (typeof CLAUDE_API_KEY !== "undefined") ? CLAUDE_API_KEY : "";
      if (!key) { alert("Missing env.js — API key not found"); return []; }

      var convo = getActiveConvo();
      if (!convo) return [];

      // Build message history for context (last 30 messages to save tokens)
      var recent = convo.messages.slice(-30);
      var apiMsgs = [];

      // Combine all messages into a narrative for context
      var chatLog = "";
      for (var i = 0; i < recent.length; i++) {
        var m = recent[i];
        if (m.from === "system") continue;
        if (m.from === "You") {
          chatLog += "[Student]: " + m.text + "\n";
        } else {
          chatLog += "[" + m.from + "]: " + m.text + "\n";
        }
      }

      if (extraUserMsg) {
        chatLog += "[Student]: " + extraUserMsg + "\n";
      }

      // Only online characters can respond
      var online = getOnlineNames();
      var onlineNote = "CURRENTLY ONLINE: " + online.join(", ") + ". ONLY these people can send messages right now. The others are offline and must NOT appear.";

      var prompt;
      if (chatLog) {
        prompt = onlineNote + "\n\nHere is the conversation so far:\n\n" + chatLog + "\n\nContinue the group chat naturally. Only 1-" + Math.min(online.length, 2) + " messages. Keep it short and real — people don't always reply instantly or to everything.";
      } else {
        prompt = onlineNote + "\n\nStart a new group chat. One person drops a casual message — just 1-2 messages to kick things off. Keep it natural, like someone just picked up their phone.";
      }

      apiMsgs.push({ role: "user", content: prompt });

      typingEl.className = "typing show";
      typingEl.textContent = online[Math.floor(Math.random() * online.length)] + " is typing...";

      try {
        var res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": key,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1024,
            system: SYSTEM_PROMPT,
            messages: apiMsgs
          })
        });

        var data = await res.json();
        typingEl.className = "typing";

        if (data.error) {
          addMsg("system", "Error: " + (data.error.message || JSON.stringify(data.error)));
          return [];
        }

        var text = data.content[0].text.trim();
        // Extract JSON array from response
        var jsonMatch = text.match(/\[[\s\S]*\]/);
        if (!jsonMatch) {
          addMsg("system", "Could not parse response");
          return [];
        }

        var msgs = JSON.parse(jsonMatch[0]);
        return msgs;
      } catch (e) {
        typingEl.className = "typing";
        addMsg("system", "Error: " + e.message);
        return [];
      }
    }

    // ── Display bot messages with realistic delays ──────────
    async function showBotMessages(msgs) {
      for (var i = 0; i < msgs.length; i++) {
        var from = msgs[i].from || "Marco";
        if (i > 0) {
          // Realistic gap between messages: 2-8 seconds
          await new Promise(function(r) { setTimeout(r, 2000 + Math.random() * 6000); });
        }
        // Typing indicator: proportional to message length
        var typeDur = Math.min(400 + msgs[i].text.length * 30, 3000);
        typingEl.textContent = from + " is typing...";
        typingEl.className = "typing show";
        await new Promise(function(r) { setTimeout(r, typeDur); });
        typingEl.className = "typing";
        addMsg(from, msgs[i].text);
      }
    }

    // ── New conversation ────────────────────────────────────
    async function newConvo() {
      // Shuffle presence so each convo feels different
      initPresence();
      updateHeaderStatus();

      var convo = { id: Date.now(), messages: [] };
      convos.push(convo);
      activeConvoId = convo.id;
      saveConvos(convos);
      renderSidebar();
      renderMessages();

      // Small delay before someone starts typing — feels real
      await new Promise(function(r) { setTimeout(r, 1500 + Math.random() * 2000); });

      // Whoever is online kicks things off
      var msgs = await callAI(null);
      if (msgs.length > 0) await showBotMessages(msgs);
      renderSidebar();
    }

    function switchConvo(id) {
      activeConvoId = id;
      renderSidebar();
      renderMessages();
    }

    // ── Send user message ───────────────────────────────────
    async function sendUserMsg() {
      var text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      addMsg("You", text);
      sendBtn.disabled = true;
      continueBtn.disabled = true;

      var msgs = await callAI(text);
      if (msgs.length > 0) await showBotMessages(msgs);

      sendBtn.disabled = false;
      continueBtn.disabled = false;
      renderSidebar();
    }

    // ── Let them continue talking ───────────────────────────
    async function continueTalking() {
      sendBtn.disabled = true;
      continueBtn.disabled = true;

      var msgs = await callAI(null);
      if (msgs.length > 0) await showBotMessages(msgs);

      sendBtn.disabled = false;
      continueBtn.disabled = false;
      renderSidebar();
    }

    // ── Events ──────────────────────────────────────────────
    sendBtn.addEventListener("click", sendUserMsg);
    inputEl.addEventListener("keydown", function (e) {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendUserMsg(); }
    });
    continueBtn.addEventListener("click", continueTalking);
    newConvoBtn.addEventListener("click", newConvo);

    // ── Init ────────────────────────────────────────────────
    updateHeaderStatus();
    if (convos.length > 0) {
      // Open most recent
      activeConvoId = convos[convos.length - 1].id;
      renderSidebar();
      renderMessages();
    } else {
      // First visit — start a new convo
      newConvo();
    }
  })();
  </script>
</body>
</html>
